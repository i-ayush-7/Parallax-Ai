<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Debugger</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --amber:       #FF9500;
            --amber-bright:#FFB340;
            --amber-dim:   rgba(255, 149, 0, 0.12);
            --amber-glow:  rgba(255, 149, 0, 0.3);
            --amber-border:rgba(255, 149, 0, 0.28);
            --amber-border-bright: rgba(255, 149, 0, 0.6);
            --exec:        #FF3B5C;
            --exec-dim:    rgba(255, 59, 92, 0.12);
            --exec-border: rgba(255, 59, 92, 0.5);
            --green-ok:    #34C759;
            --bg-shell:    rgba(8, 6, 2, 0.93);
            --bg-code:     rgba(4, 3, 1, 0.85);
            --text:        #D4B896;
            --text-bright: #F0DFC0;
            --text-dim:    #5A4830;
            --font: 'JetBrains Mono', 'Consolas', 'Courier New', monospace;
        }

        body {
            background: transparent;
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
            -webkit-app-region: drag;
        }

        /* CRT Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.07) 3px,
                rgba(0, 0, 0, 0.07) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ─── OUTER SHELL ─── */
        .hud-shell {
            position: absolute;
            top: 14px; left: 14px; right: 14px; bottom: 14px;
            background: var(--bg-shell);
            border: 1px solid var(--amber-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0,0,0,0.8),
                0 0 30px rgba(255, 149, 0, 0.08),
                inset 0 1px 0 rgba(255, 149, 0, 0.06);
            -webkit-app-region: drag;
        }

        /* Corner accent marks */
        .hud-shell::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 14px; height: 14px;
            border-top: 2px solid var(--amber);
            border-left: 2px solid var(--amber);
            z-index: 10;
            pointer-events: none;
        }
        .hud-shell::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 14px; height: 14px;
            border-bottom: 2px solid var(--amber);
            border-right: 2px solid var(--amber);
            z-index: 10;
            pointer-events: none;
        }

        /* ─── HEADER ─── */
        .hud-header {
            height: 38px;
            padding: 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--amber-border);
            background: rgba(255, 149, 0, 0.04);
            flex-shrink: 0;
            position: relative;
        }

        /* Subtle header glow line */
        .hud-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--amber-glow), transparent);
        }

        .hud-title {
            font-size: 0.68em;
            font-weight: 700;
            letter-spacing: 3.5px;
            color: var(--amber);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--amber-glow);
        }

        .hud-status-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.6em;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            text-transform: uppercase;
            transition: color 0.4s;
        }

        .status-pip {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--text-dim);
            box-shadow: none;
            transition: background 0.4s, box-shadow 0.4s;
        }

        .status-pill.live .status-pip {
            background: var(--green-ok);
            box-shadow: 0 0 6px var(--green-ok);
        }
        .status-pill.live { color: var(--text); }

        .hud-build {
            font-size: 0.58em;
            color: var(--text-dim);
            letter-spacing: 1px;
            font-style: italic;
        }

        /* ─── CHAT CONTENT ─── */
        #chat-content {
            flex: 1 1 0;
            overflow-y: auto;
            padding: 14px 14px 8px;
            font-size: 0.8em;
            line-height: 1.7;
            color: var(--text);
            -webkit-app-region: no-drag;
            scroll-behavior: smooth;
        }

        #chat-content::-webkit-scrollbar { width: 3px; }
        #chat-content::-webkit-scrollbar-track { background: transparent; }
        #chat-content::-webkit-scrollbar-thumb {
            background: var(--amber-border-bright);
            border-radius: 2px;
        }

        /* ─── THINKING INDICATOR ─── */
        .thinking {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 0 4px;
            color: var(--text-dim);
            font-size: 0.72em;
            letter-spacing: 1.5px;
        }
        .thinking.active { display: flex; }
        .thinking-dots { display: flex; gap: 4px; }
        .thinking-dots span {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--amber);
            opacity: 0.3;
            animation: dot-pulse 1.2s ease-in-out infinite;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dot-pulse {
            0%,100% { opacity: 0.2; transform: scale(0.8); }
            50%      { opacity: 1;   transform: scale(1.2); box-shadow: 0 0 6px var(--amber); }
        }

        /* ─── CODE BLOCKS ─── */
        .code-block {
            background: var(--bg-code);
            border: 1px solid var(--amber-border);
            border-left: 2px solid var(--amber);
            margin: 10px 0;
            border-radius: 0 3px 3px 0;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Language label header bar */
        .code-lang {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 10px;
            background: rgba(255, 149, 0, 0.06);
            border-bottom: 1px solid rgba(255, 149, 0, 0.1);
        }
        .code-lang-label {
            font-size: 0.6em;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--amber);
            opacity: 0.7;
        }

        .code-block pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: var(--font);
            color: var(--text-bright);
            font-size: 0.93em;
            line-height: 1.6;
            padding: 10px 13px;
        }

        /* Action bar sits at bottom of every code block */
        .code-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            padding: 5px 8px;
            border-top: 1px solid rgba(255, 149, 0, 0.12);
            background: rgba(255, 149, 0, 0.03);
            -webkit-app-region: no-drag;
        }

        .copy-btn, .exec-btn {
            font-size: 0.63em;
            cursor: pointer;
            padding: 4px 11px;
            border-radius: 2px;
            font-family: var(--font);
            letter-spacing: 1.8px;
            text-transform: uppercase;
            font-weight: 500;
            transition: all 0.15s ease;
            -webkit-app-region: no-drag;
        }

        .copy-btn {
            background: var(--amber-dim);
            border: 1px solid var(--amber-border-bright);
            color: var(--amber);
        }
        .copy-btn:hover {
            background: var(--amber);
            color: #000;
            box-shadow: 0 0 10px var(--amber-glow);
        }
        .copy-btn:active { transform: scale(0.96); }

        .exec-btn {
            background: var(--exec-dim);
            border: 1px solid var(--exec-border);
            color: var(--exec);
        }
        .exec-btn:hover {
            background: var(--exec);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 59, 92, 0.4);
        }
        .exec-btn:active { transform: scale(0.96); }

        /* ─── CHAT INPUT BAR ─── */
        .chat-input-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-top: 1px solid var(--amber-border);
            background: rgba(255, 149, 0, 0.02);
            flex-shrink: 0;
            -webkit-app-region: no-drag;
        }

        #chat-input {
            flex: 1;
            background: rgba(255, 149, 0, 0.05);
            border: 1px solid rgba(255, 149, 0, 0.2);
            border-radius: 3px;
            color: var(--text-bright);
            font-family: var(--font);
            font-size: 0.75em;
            padding: 7px 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-app-region: no-drag;
        }
        #chat-input::placeholder { color: var(--text-dim); }
        #chat-input:focus {
            border-color: var(--amber-border-bright);
            box-shadow: 0 0 8px rgba(255, 149, 0, 0.1);
        }

        #btn-send {
            background: var(--amber-dim);
            border: 1px solid var(--amber-border-bright);
            color: var(--amber);
            font-family: var(--font);
            font-size: 0.7em;
            letter-spacing: 1.5px;
            padding: 7px 12px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-app-region: no-drag;
            flex-shrink: 0;
        }
        #btn-send:hover {
            background: var(--amber);
            color: #000;
            box-shadow: 0 0 10px var(--amber-glow);
        }
        #btn-send:active { transform: scale(0.96); }

        /* User message bubble */
        .user-msg {
            text-align: right;
            margin: 6px 0 10px;
        }
        .user-msg span {
            display: inline-block;
            background: rgba(255, 149, 0, 0.1);
            border: 1px solid rgba(255, 149, 0, 0.25);
            border-radius: 3px 0 3px 3px;
            padding: 5px 10px;
            font-size: 0.85em;
            color: var(--text-bright);
            max-width: 85%;
            word-wrap: break-word;
        }

        /* ─── DIVIDER ─── */
        .hud-divider {
            height: 1px;
            margin: 0 14px;
            background: linear-gradient(90deg, transparent, var(--amber-border), transparent);
            flex-shrink: 0;
        }

        /* ─── FOOTER ─── */
        .hud-footer {
            padding: 12px 14px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: rgba(255, 149, 0, 0.02);
            -webkit-app-region: no-drag;
        }

        /* ─── GHOST CORE (left side of footer) ─── */
        #ghost-core {
            position: relative;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-app-region: drag;
            flex-shrink: 0;
        }

        .g-ring {
            position: absolute;
            border-radius: 50%;
            border-style: solid;
            border-color: transparent;
        }

        .g-ring-1 {
            width: 46px; height: 46px;
            border-width: 1px;
            border-top-color: rgba(255, 149, 0, 0.25);
            border-right-color: rgba(255, 149, 0, 0.10);
            animation: spin 9s linear infinite;
        }
        .g-ring-2 {
            width: 32px; height: 32px;
            border-width: 1px;
            border-bottom-color: rgba(255, 149, 0, 0.5);
            border-left-color: rgba(255, 149, 0, 0.2);
            animation: spin 4.5s linear infinite reverse;
        }

        .g-nucleus {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--amber);
            box-shadow: 0 0 6px var(--amber), 0 0 16px var(--amber-glow);
            animation: breathe 2.4s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        @keyframes breathe {
            0%,100% { box-shadow: 0 0 6px var(--amber), 0 0 16px var(--amber-glow); opacity: 0.8; }
            50%     { box-shadow: 0 0 10px var(--amber), 0 0 28px var(--amber-glow); opacity: 1; }
        }

        /* Speaking state */
        #ghost-core.speaking .g-ring-1 {
            animation: spin 1.2s linear infinite;
            border-top-color: rgba(255, 149, 0, 0.8);
            border-right-color: rgba(255, 149, 0, 0.5);
        }
        #ghost-core.speaking .g-ring-2 {
            animation: spin 0.7s linear infinite reverse;
            border-bottom-color: var(--amber);
            border-left-color: rgba(255, 149, 0, 0.7);
        }
        #ghost-core.speaking .g-nucleus {
            animation: pulse-speak 0.45s ease-in-out infinite;
        }

        @keyframes pulse-speak {
            0%,100% {
                box-shadow: 0 0 12px var(--amber), 0 0 30px var(--amber-glow), 0 0 55px rgba(255,149,0,0.15);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 20px var(--amber-bright), 0 0 50px var(--amber-glow), 0 0 80px rgba(255,149,0,0.1);
                transform: scale(1.5);
            }
        }

        /* ─── CONTROLS (right side of footer) ─── */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 7px;
            align-items: flex-end;
        }

        .hud-btn {
            background: rgba(255, 149, 0, 0.05);
            color: var(--amber);
            border: 1px solid var(--amber-border-bright);
            padding: 5px 14px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 0.65em;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            border-radius: 2px;
            transition: all 0.15s ease;
            -webkit-app-region: no-drag;
            white-space: nowrap;
        }

        .hud-btn:hover {
            background: var(--amber);
            color: #000;
            box-shadow: 0 0 14px var(--amber-glow);
        }

        .hud-btn.active {
            background: var(--amber-dim);
            color: var(--amber-bright);
            border-color: var(--amber);
            box-shadow: 0 0 8px var(--amber-glow);
        }

        /* Ghost separator between orb and controls */
        .footer-sep {
            width: 1px;
            height: 36px;
            background: linear-gradient(180deg, transparent, var(--amber-border), transparent);
            flex-shrink: 0;
        }

        video { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; z-index: -1; }
    </style>
</head>
<body>

    <div class="hud-shell" id="chat-panel">

        <header class="hud-header">
            <span class="hud-title">Ghost_Dbg</span>
            <div class="hud-status-row">
                <span class="status-pill" id="status-scr">
                    <span class="status-pip"></span>SCR
                </span>
                <span class="status-pill" id="status-aud">
                    <span class="status-pip"></span>AUD
                </span>
            </div>
            <span class="hud-build">v2.5-flash</span>
        </header>

        <div id="chat-content">Awaiting uplink...<br>
            <div class="thinking" id="thinking-indicator">
                <div class="thinking-dots">
                    <span></span><span></span><span></span>
                </div>
                processing
            </div>
        </div>

        <div class="chat-input-bar">
            <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" spellcheck="false" />
            <button id="btn-send">SEND</button>
        </div>

        <div class="hud-divider"></div>

        <footer class="hud-footer">
            <div id="ghost-core">
                <div class="g-ring g-ring-1"></div>
                <div class="g-ring g-ring-2"></div>
                <div class="g-nucleus"></div>
            </div>
            <div class="footer-sep"></div>
            <div class="controls">
                <button id="btn-screen" class="hud-btn">Init Screen</button>
                <button id="btn-connect" class="hud-btn">Init Audio</button>
            </div>
        </footer>

    </div>

    <video id="screen-preview" muted></video>

    <script>
    const ws = new WebSocket("ws://localhost:8000/ws");
    const videoElement = document.getElementById('screen-preview');
    const chatContent = document.getElementById('chat-content');
    const ghostCore = document.getElementById('ghost-core');

    let micContext, playContext, screenInterval;
    let nextStartTime = 0; 
    let audioTimer, messageTimeout; 
    
    let currentMessageText = ""; 
    let currentMessageDiv = null; 

    const thinkingIndicator = document.getElementById('thinking-indicator');

    function showThinking() {
        // Move indicator to bottom of chat and show it
        chatContent.appendChild(thinkingIndicator);
        thinkingIndicator.classList.add('active');
        chatContent.scrollTop = chatContent.scrollHeight;
    }
    function hideThinking() {
        thinkingIndicator.classList.remove('active');
    }

    // Helper functions for inline buttons
    window.copyCode = function(btn) {
        const pre = btn.closest('.code-block').querySelector('pre');
        navigator.clipboard.writeText(pre.innerText).then(() => {
            btn.innerText = "✓ Copied!";
            setTimeout(() => { btn.innerHTML = "&#x2398; Copy"; }, 2000);
        });
    };

    window.execCommand = function(btn) {
        const pre = btn.closest('.code-block').querySelector('pre');
        const cmd = pre.innerText.trim();
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ execute_command: cmd }));
            appendLog(`EXECUTING: ${cmd}`, '#FF9500');
            btn.innerText = "Sent!";
            setTimeout(() => { btn.innerText = "Execute"; }, 2000);
            currentMessageDiv = null;
        }
    };

    function sendTextMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;

        // Show user bubble
        const userBubble = document.createElement('div');
        userBubble.className = 'user-msg';
        userBubble.innerHTML = `<span>${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>`;
        chatContent.appendChild(userBubble);
        chatContent.scrollTop = chatContent.scrollHeight;

        ws.send(JSON.stringify({ text_input: text }));
        input.value = '';
        currentMessageDiv = null;
        showThinking();
    }

    document.getElementById('btn-send').addEventListener('click', sendTextMessage);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendTextMessage(); }
    });

    function appendLog(text, color) {
        chatContent.innerHTML += `<div style="color:${color}; margin: 5px 0; font-size:0.9em;">> ${text}</div>`;
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    // Custom Real-Time Markdown Parser
    function parseMarkdown(md) {
        // Escape HTML
        let html = md.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        let codeBlocks = [];
        // Extract and format code blocks
        html = html.replace(/```([a-z0-9]*)\n([\s\S]*?)(```|$)/gi, function(match, lang, code, closeTag) {
            let isComplete = closeTag === "```";
            let isCmd = ['bash', 'sh', 'cmd', 'powershell', 'terminal'].includes(lang.toLowerCase());
            let langLabel = lang ? lang.toUpperCase() : 'CODE';

            let actionsHtml = '';
            if (isComplete) {
                let execBtn = isCmd ? `<button class="exec-btn" onclick="window.execCommand(this)">&#9889; Execute</button>` : '';
                actionsHtml = `<div class="code-actions">${execBtn}<button class="copy-btn" onclick="window.copyCode(this)">&#x2398; Copy</button></div>`;
            }

            let token = `__CODE_BLOCK_${codeBlocks.length}__`;
            codeBlocks.push(`<div class="code-block"><div class="code-lang"><span class="code-lang-label">${langLabel}</span></div><pre>${code}</pre>${actionsHtml}</div>`);
            return token;
        });
        
        // Format bold and inline code
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#F0DFC0">$1</strong>');
        html = html.replace(/`(.*?)`/g, '<span style="background: rgba(255,149,0,0.15); padding: 0 4px; border-radius: 2px; color:#FFB340;">$1</span>');
        
        // Convert newlines to breaks
        html = html.replace(/\n/g, '<br>');
        
        // Re-insert code blocks
        codeBlocks.forEach((block, index) => {
            html = html.replace(`__CODE_BLOCK_${index}__`, block);
        });
        
        return html;
    }

    document.getElementById('btn-screen').addEventListener('click', async () => {
        try {
            const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
            videoElement.srcObject = screenStream;
            await videoElement.play();
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            screenInterval = setInterval(() => {
                if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA && videoElement.videoWidth > 0) {
                    canvas.width = 640; 
                    canvas.height = Math.floor((videoElement.videoHeight / videoElement.videoWidth) * 640);
                    context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
                    const base64Image = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
                    if (ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ image: base64Image })); }
                }
            }, 500);

            document.getElementById('status-scr').classList.add('live');
            document.getElementById('btn-screen').classList.add('active');
            appendLog("OPTICAL SENSORS ONLINE.", "#FF9500");
        } catch (err) { console.error("Screen capture failed.", err); }
    });

    document.getElementById('btn-connect').addEventListener('click', async () => {
        try {
            micContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            playContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
            const micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = micContext.createMediaStreamSource(micStream);
            const processor = micContext.createScriptProcessor(4096, 1, 1);
            
            source.connect(processor);
            processor.connect(micContext.destination);

            processor.onaudioprocess = (e) => {
                const float32Array = e.inputBuffer.getChannelData(0);
                const int16Array = new Int16Array(float32Array.length);
                for (let i = 0; i < float32Array.length; i++) { int16Array[i] = Math.max(-32768, Math.min(32767, float32Array[i] * 32768)); }
                let binary = '';
                const bytes = new Uint8Array(int16Array.buffer);
                for (let i = 0; i < bytes.byteLength; i++) { binary += String.fromCharCode(bytes[i]); }
                if (ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ audio: window.btoa(binary) })); }
            };

            document.getElementById('status-aud').classList.add('live');
            document.getElementById('btn-connect').classList.add('active');
            appendLog("AUDIO UPLINK ESTABLISHED.", "#FF9500");
        } catch (err) { console.error("Mic failed.", err); }
    });

    ws.onmessage = async (event) => {
        try {
            const data = JSON.parse(event.data);
            
            if (data.text) {
                hideThinking();
                // Handle system execution logs directly
                if (data.text.includes("[LOG]")) {
                    appendLog(data.text.replace("[LOG]", "").trim(), "#FF9500");
                    currentMessageDiv = null; 
                    return; 
                }

                // Setup a new message block if one isn't active
                if (!currentMessageDiv) {
                    currentMessageText = "";
                    currentMessageDiv = document.createElement('div');
                    currentMessageDiv.style.marginBottom = "15px";
                    chatContent.appendChild(currentMessageDiv);
                }

                // Reset the idle timer. If AI stops speaking for 3s, the next text gets a new bubble.
                clearTimeout(messageTimeout);
                messageTimeout = setTimeout(() => { currentMessageDiv = null; }, 3000);

                // Append the chunk and re-render the markdown
                currentMessageText += data.text;
                currentMessageDiv.innerHTML = parseMarkdown(currentMessageText);
                chatContent.scrollTop = chatContent.scrollHeight;
            }

            if (data.audio && playContext) {
                hideThinking();
                const binaryString = window.atob(data.audio);
                const pcmData = new Float32Array(binaryString.length / 2);
                for (let i = 0; i < pcmData.length; i++) {
                    const byte1 = binaryString.charCodeAt(i * 2);
                    const byte2 = binaryString.charCodeAt(i * 2 + 1);
                    let val = byte1 | (byte2 << 8);
                    if (val >= 32768) val -= 65536; 
                    pcmData[i] = val / 32768.0;     
                }
                
                const audioBuffer = playContext.createBuffer(1, pcmData.length, 24000); 
                audioBuffer.copyToChannel(pcmData, 0);
                
                const playSource = playContext.createBufferSource();
                playSource.buffer = audioBuffer;
                playSource.connect(playContext.destination);
                
                const currentTime = playContext.currentTime;
                if (nextStartTime < currentTime) nextStartTime = currentTime;
                
                playSource.start(nextStartTime);
                
                ghostCore.classList.add("speaking");
                clearTimeout(audioTimer);
                audioTimer = setTimeout(() => { ghostCore.classList.remove("speaking"); }, audioBuffer.duration * 1000); 
                nextStartTime += audioBuffer.duration;
            }
        } catch (e) {
            console.error("Payload parse error:", e);
        }
    };
    </script>
</body>
